name: Release

# Three trigger paths, all funneling into the same workflow run:
#
#   1. push to master/main touching `Cargo.toml` — detect a version
#      bump and (if new) create the `v<x.y.z>` tag AND run the
#      release in the same run. This is what `tag.yml` used to do,
#      now folded in here because pushing a tag with the default
#      GITHUB_TOKEN does NOT trigger a separate workflow:
#      https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
#      → "events triggered by the GITHUB_TOKEN ... will not create a
#      new workflow run". That doc note is exactly why the prior
#      tag.yml created the tag but release.yml never fired.
#
#   2. push of a manually-created `v*` tag — release the tagged
#      commit. Useful for re-running a release on an existing tag.
#
#   3. workflow_dispatch — manual run for debugging the release
#      pipeline without bumping the version.
on:
  push:
    # Two trigger shapes — a path-filtered branch push (`Cargo.toml`
    # bump on master) AND any `v*` tag push. GitHub Actions
    # documents this combined form at
    # https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#using-filters
    # — a push event runs when EITHER the branches+paths filter
    # matches OR the tags filter matches. The `detect-and-tag` job
    # below disambiguates which arm fired.
    branches:
      - master
      - main
    paths:
      - 'Cargo.toml'
    tags:
      - 'v*'
  workflow_dispatch:

# Avoid overlapping release runs for the same ref clobbering each other.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # detect-and-tag
  # ────────────────────────────────────────────────────────────────
  # Resolves the release version that downstream jobs will publish:
  #
  #   * Tag push (`refs/tags/v1.2.3`)            → version = 1.2.3,
  #                                                 should_release = true
  #   * Master push with bumped Cargo.toml ver   → create `v<ver>` tag,
  #                                                 should_release = true
  #   * Master push with no version bump         → should_release = false,
  #                                                 every downstream job
  #                                                 skips via `needs.detect.outputs.should_release`
  #   * workflow_dispatch                        → uses current Cargo.toml
  #                                                 version, doesn't tag
  detect-and-tag:
    name: Detect version and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      should_release: ${{ steps.resolve.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags so the version detector can compare
          # against existing tags without an extra `git fetch --tags`.
          fetch-depth: 0

      - name: Resolve release version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          # Trigger arm 2: tag push.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              VERSION="${GITHUB_REF#refs/tags/v}"
              echo "Tag push detected: v${VERSION}"
              echo "version=${VERSION}"        >> "$GITHUB_OUTPUT"
              echo "tag=v${VERSION}"           >> "$GITHUB_OUTPUT"
              echo "should_release=true"       >> "$GITHUB_OUTPUT"
              exit 0
          fi

          # Read [workspace.package].version from Cargo.toml.
          VERSION=$(awk '
              /^\[workspace\.package\]/ { in_section=1; next }
              in_section && /^\[/        { in_section=0 }
              in_section && /^version[[:space:]]*=/ {
                  match($0, /"[^"]+"/);
                  v=substr($0, RSTART+1, RLENGTH-2);
                  print v; exit
              }
          ' Cargo.toml)
          if [ -z "${VERSION}" ]; then
              echo "::error::Could not parse workspace version from Cargo.toml"
              exit 1
          fi
          TAG="v${VERSION}"
          echo "Workspace version: ${VERSION}"

          # Trigger arm 3: manual dispatch.
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              echo "Manual dispatch — using current Cargo.toml version, no tag push."
              echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
              echo "tag=${TAG}"           >> "$GITHUB_OUTPUT"
              echo "should_release=true"  >> "$GITHUB_OUTPUT"
              exit 0
          fi

          # Trigger arm 1: master push touching Cargo.toml. Check if
          # the version is actually new — re-pushes of the same
          # version are a no-op (someone touched Cargo.toml for an
          # unrelated reason).
          if git rev-parse "${TAG}" >/dev/null 2>&1 \
             || git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
              echo "Tag ${TAG} already exists — version was not bumped, no release."
              echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
              echo "tag=${TAG}"           >> "$GITHUB_OUTPUT"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          echo "New version ${VERSION} detected — will tag and release."
          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"           >> "$GITHUB_OUTPUT"
          echo "should_release=true"  >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        # Only when we just decided to release AND we weren't already on
        # a tag push (which would mean the tag already exists).
        if: |
          steps.resolve.outputs.should_release == 'true'
          && !startsWith(github.ref, 'refs/tags/v')
          && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
          TAG: ${{ steps.resolve.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${VERSION} (auto-tagged from $(git rev-parse --short HEAD))"
          git push origin "${TAG}"
          echo "Pushed ${TAG}. Release jobs below will publish artifacts for it."

  build-release:
    needs: detect-and-tag
    if: needs.detect-and-tag.outputs.should_release == 'true'
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Do NOT cancel the other targets when one fails — otherwise a single
      # failing target shows the whole release as "cancelled" with no error.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kojacoord-proxy-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: kojacoord-proxy-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kojacoord-proxy-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: kojacoord-proxy-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: kojacoord-proxy-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # Tell Cargo which linker to use for the aarch64 target. Without this the
      # build fails at the link step (and previously cancelled the whole matrix).
      - name: Configure ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache cargo & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --bin kojacoord-proxy --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/kojacoord-proxy.exe" "${{ matrix.artifact_name }}"
          else
            cp "target/${{ matrix.target }}/release/kojacoord-proxy" "${{ matrix.artifact_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [detect-and-tag, build-release]
    runs-on: ubuntu-latest
    if: needs.detect-and-tag.outputs.should_release == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # git-cliff needs the full history + tags to build the changelog range.
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Extract version from tag
        id: get_version
        # Pulled from `detect-and-tag` rather than `${GITHUB_REF}` —
        # on master-push runs the ref is `refs/heads/master`, not the
        # `v<x.y.z>` tag; the detect job has the canonical version.
        run: echo "VERSION=${{ needs.detect-and-tag.outputs.version }}" >> "$GITHUB_OUTPUT"

      # Build the changelog for THIS tag only (commits since the previous tag),
      # grouped by Conventional Commit type via cliff.toml.
      #
      # `--latest --strip header` cuts the rendered output to just the
      # newest section, no top-of-file H1. `OUTPUT` writes the rendered
      # markdown to a file path we can `cat` later — the action's
      # `outputs.changelog` value contains that path, NOT the body.
      - name: Generate changelog from semantic commits
        id: changelog
        uses: orhun/git-cliff-action@4a4a951bc43fafe41cd2348d181853f52356bee7 # v4
        continue-on-error: true
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      # Fallback: if git-cliff produces nothing (FIRST tag in the
      # repo's history — there's no prior tag for `--latest` to bound
      # against — or the action itself errors), synthesise a minimal
      # changelog from `git log` so the release notes still ship with
      # something useful instead of a bare "Downloads" stub.
      - name: Synthesise changelog fallback if empty
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s CHANGES.md ]; then
              echo "git-cliff produced no output — falling back to raw git log."
              PREV_TAG="$(git describe --tags --abbrev=0 --exclude="${{ needs.detect-and-tag.outputs.tag }}" 2>/dev/null || true)"
              {
                  echo "### Changes"
                  echo
                  if [ -n "$PREV_TAG" ]; then
                      git log --pretty=format:'- %s (%h)' "$PREV_TAG..HEAD"
                  else
                      # First-ever tag: include everything from the initial
                      # commit. Capped at 100 lines so the release notes
                      # don't blow past GitHub's 125k-char body limit on
                      # large repos.
                      git log --pretty=format:'- %s (%h)' | head -100
                  fi
                  echo
              } > CHANGES.md
          fi
          echo "--- CHANGES.md ---"
          cat CHANGES.md

      - name: Assemble release notes
        shell: bash
        run: |
          {
            echo "## Kojacoord Proxy ${{ steps.get_version.outputs.VERSION }}"
            echo
            cat CHANGES.md
            echo
            echo "### Downloads"
            echo "Choose the appropriate binary for your platform:"
            echo "- Linux x86_64: \`kojacoord-proxy-linux-x86_64\`"
            echo "- Linux ARM64: \`kojacoord-proxy-linux-aarch64\`"
            echo "- Windows x86_64: \`kojacoord-proxy-windows-x86_64.exe\`"
            echo "- macOS x86_64: \`kojacoord-proxy-macos-x86_64\`"
            echo "- macOS ARM64: \`kojacoord-proxy-macos-aarch64\`"
            echo
            echo "### Installation"
            echo "1. Download the binary for your platform"
            echo "2. Make it executable (Linux/macOS): \`chmod +x kojacoord-proxy-*\`"
            echo "3. Run the binary: \`./kojacoord-proxy-*\`"
            echo
            echo "### Documentation"
            echo "- Library docs (docs.rs): https://docs.rs/kojacoord-protocol"
            echo "- API reference: https://docs.rs/kojacoord-api"
            echo "- See the [README](https://github.com/${{ github.repository }}/blob/master/README.md) for usage."
          } > release_notes.md

      # download-artifact@v4 nests each artifact in its own subdirectory; flatten
      # them into dist/ so checksums, signatures and release uploads use clean,
      # predictable basenames.
      - name: Collect artifacts into dist/
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp -t dist/ {} +
          ls -l dist

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: .
          artifact-name: kojacoord-proxy-${{ steps.get_version.outputs.VERSION }}.spdx.json
          output-file: dist/kojacoord-proxy-${{ steps.get_version.outputs.VERSION }}.spdx.json
          format: spdx-json

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      # Keyless (OIDC) signing — no long-lived keys. Verify with:
      #   cosign verify-blob --bundle SHA256SUMS.cosign.bundle \
      #     --certificate-identity-regexp '.*' --certificate-oidc-issuer-regexp '.*' SHA256SUMS
      - name: Sign checksums with cosign
        run: |
          cosign sign-blob --yes \
            --bundle dist/SHA256SUMS.cosign.bundle \
            dist/SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: ${{ needs.detect-and-tag.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/*

  # Publishing to crates.io is best-effort and intentionally decoupled from the
  # binary release: a publish failure (e.g. a version that already exists) must
  # never cancel or block the GitHub Release. Runs only on tag pushes.
  publish-crates:
    name: Publish to crates.io
    needs: detect-and-tag
    runs-on: ubuntu-latest
    if: needs.detect-and-tag.outputs.should_release == 'true'
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Order matters when crates depend on each other. `protocol` must publish
      # first (auth/netty depend on it); the rest are leaves today. docs.rs
      # automatically builds & hosts documentation for each crate once it lands
      # on crates.io (configured via [package.metadata.docs.rs]).
      - name: Publish crates (best-effort, in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          for crate in protocol auth netty config api plugin-system cluster metrics; do
            echo "::group::publish kojacoord-$crate"
            cargo publish --manifest-path "crates/$crate/Cargo.toml" --no-verify
            echo "exit=$? (non-fatal)"
            echo "::endgroup::"
          done
          exit 0

  # Build the full workspace rustdoc and publish it to GitHub Pages. This is the
  # self-hosted companion to docs.rs (which builds per-crate docs on publish).
  deploy-docs:
    name: Deploy Documentation
    needs: detect-and-tag
    runs-on: ubuntu-latest
    if: needs.detect-and-tag.outputs.should_release == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build documentation
        env:
          # Enable docs.rs-style cfg so #[cfg(docsrs)] gated docs render here too.
          RUSTDOCFLAGS: "--cfg docsrs"
        run: |
          cargo doc --no-deps \
            -p kojacoord-protocol \
            -p kojacoord-auth \
            -p kojacoord-netty \
            -p kojacoord-config \
            -p kojacoord-api \
            -p kojacoord-plugin-system \
            -p kojacoord-cluster \
            -p kojacoord-metrics

      - name: Add index redirect
        run: |
          echo '<meta http-equiv="refresh" content="0; url=kojacoord_protocol/index.html">' > target/doc/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Build the container image from the existing Dockerfile and push it to the
  # GitHub Container Registry (GHCR). Multi-arch (amd64 + arm64) via Buildx/QEMU.
  docker:
    name: Build & Push Docker image
    needs: detect-and-tag
    runs-on: ubuntu-latest
    if: needs.detect-and-tag.outputs.should_release == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          # Tag with the full version, major.minor, and 'latest' on tag pushes.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # Generate Homebrew (macOS/Linux) and Scoop (Windows) manifests from the
  # released binaries' checksums, then publish them so the proxy is installable
  # with a single command. Best-effort: never blocks the core release.
  package-managers:
    name: Update package managers
    needs: [detect-and-tag, create-release]
    runs-on: ubuntu-latest
    if: needs.detect-and-tag.outputs.should_release == 'true'
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        # Pulled from `detect-and-tag` rather than `${GITHUB_REF}` —
        # on master-push runs the ref is `refs/heads/master`, not the
        # `v<x.y.z>` tag; the detect job has the canonical version.
        run: echo "VERSION=${{ needs.detect-and-tag.outputs.version }}" >> "$GITHUB_OUTPUT"

      # Pull the signed checksum manifest published by create-release so the
      # generated formulae reference the exact bytes that were released.
      - name: Download SHA256SUMS from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.detect-and-tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "SHA256SUMS" \
            --output SHA256SUMS
          cat SHA256SUMS

      - name: Render Homebrew formula & Scoop manifest
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          sha() { grep " $1$" SHA256SUMS | awk '{print $1}'; }
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"

          MAC_ARM=$(sha kojacoord-proxy-macos-aarch64)
          MAC_X64=$(sha kojacoord-proxy-macos-x86_64)
          LIN_ARM=$(sha kojacoord-proxy-linux-aarch64)
          LIN_X64=$(sha kojacoord-proxy-linux-x86_64)
          WIN_X64=$(sha kojacoord-proxy-windows-x86_64.exe)

          mkdir -p Formula bucket

          cat > Formula/kojacoord-proxy.rb <<EOF
          # This file is auto-generated by the release workflow. Do not edit by hand.
          class KojacoordProxy < Formula
            desc "High-performance Minecraft proxy"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/kojacoord-proxy-macos-aarch64"
                sha256 "${MAC_ARM}"
              end
              on_intel do
                url "${BASE}/kojacoord-proxy-macos-x86_64"
                sha256 "${MAC_X64}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/kojacoord-proxy-linux-aarch64"
                sha256 "${LIN_ARM}"
              end
              on_intel do
                url "${BASE}/kojacoord-proxy-linux-x86_64"
                sha256 "${LIN_X64}"
              end
            end

            def install
              bin.install Dir["kojacoord-proxy-*"].first => "kojacoord-proxy"
            end

            test do
              assert_match "kojacoord", shell_output("#{bin}/kojacoord-proxy --help 2>&1", 2)
            end
          end
          EOF

          cat > bucket/kojacoord-proxy.json <<EOF
          {
            "version": "${VERSION}",
            "description": "High-performance Minecraft proxy",
            "homepage": "https://github.com/${REPO}",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "${BASE}/kojacoord-proxy-windows-x86_64.exe",
                "hash": "${WIN_X64}",
                "bin": [["kojacoord-proxy-windows-x86_64.exe", "kojacoord-proxy"]]
              }
            },
            "checkver": "github",
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/${REPO}/releases/download/v\$version/kojacoord-proxy-windows-x86_64.exe"
                }
              }
            }
          }
          EOF

          echo "--- Formula/kojacoord-proxy.rb ---"; cat Formula/kojacoord-proxy.rb
          echo "--- bucket/kojacoord-proxy.json ---"; cat bucket/kojacoord-proxy.json

      # Commit the rendered manifests back to the default branch so the repo
      # doubles as a Homebrew tap (Formula/) and a Scoop bucket (bucket/).
      - name: Commit manifests to default branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "${{ github.event.repository.default_branch }}"
          git checkout "${{ github.event.repository.default_branch }}"
          cp -f Formula/kojacoord-proxy.rb bucket/kojacoord-proxy.json /tmp/ 2>/dev/null || true
          mkdir -p Formula bucket
          cp -f /tmp/kojacoord-proxy.rb Formula/kojacoord-proxy.rb
          cp -f /tmp/kojacoord-proxy.json bucket/kojacoord-proxy.json
          git add Formula/kojacoord-proxy.rb bucket/kojacoord-proxy.json
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore(release): update package manager manifests for v${{ steps.get_version.outputs.VERSION }}"
            git push origin "${{ github.event.repository.default_branch }}"
          fi

      - name: Attach manifests to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.detect-and-tag.outputs.tag }}" \
            Formula/kojacoord-proxy.rb \
            bucket/kojacoord-proxy.json \
            --repo "${{ github.repository }}" --clobber
