# Sensitive configuration for kojacoord-proxy.
#
# This is a TEMPLATE. Do NOT commit real secrets. Provision the actual values
# out-of-band, e.g.:
#
#   kubectl create secret generic kojacoord-secrets \
#     --namespace default \
#     --from-literal=KOJA_DATABASE__URL='mysql://user:STRONG_PASS@mysql-service:3306/kojacoord' \
#     --from-literal=KOJA_SERVER_MANAGEMENT__AUTH_TOKEN="$(openssl rand -hex 32)" \
#     --from-literal=KOJA_HTTP_API__AUTH_TOKEN="$(openssl rand -hex 32)"
#
# For GitOps, prefer SealedSecrets / External Secrets Operator / Vault rather
# than a plain Secret. Enable etcd encryption-at-rest in the cluster.
apiVersion: v1
kind: Secret
metadata:
  name: kojacoord-secrets
  namespace: default
type: Opaque
stringData:
  KOJA_DATABASE__URL: "REPLACE_ME_mysql://user:password@mysql-service:3306/kojacoord"
  KOJA_SERVER_MANAGEMENT__AUTH_TOKEN: "REPLACE_ME_WITH_openssl_rand_hex_32"
  KOJA_HTTP_API__AUTH_TOKEN: "REPLACE_ME_WITH_openssl_rand_hex_32"
