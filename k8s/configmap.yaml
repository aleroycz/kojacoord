apiVersion: v1
kind: ConfigMap
metadata:
  name: kojacoord-config
  namespace: default
data:
  config.toml: |
    [proxy]
    bind = "0.0.0.0:25577"
    online_mode = true
    compression_threshold = 256
    session_timeout_secs = 30
    prevent_proxy_connections = true

    [[servers]]
    name = "lobby"
    address = "lobby-server:25565"
    restricted = false
    backend_type = "vanilla"

    [[servers]]
    name = "survival"
    address = "survival-server:25565"
    restricted = false
    backend_type = "vanilla"

    [database]
    # Injected at runtime via KOJA_DATABASE__URL from the kojacoord-secrets Secret.
    max_connections = 10

    [anticheat]
    enabled = true
    strict_mode = false

    [server_management]
    # NOTE: bound to 0.0.0.0 for in-cluster access — restrict reachability with a
    # NetworkPolicy so only trusted backends can connect. auth_token is injected
    # via KOJA_SERVER_MANAGEMENT__AUTH_TOKEN from the kojacoord-secrets Secret.
    enabled = true
    bind = "0.0.0.0:8080"

    [http_api]
    # auth_token injected via KOJA_HTTP_API__AUTH_TOKEN from the Secret.
    enabled = true
    bind = "0.0.0.0:8081"

    [cluster]
    enabled = false
    node_id = "kojacoord-proxy-1"
    discovery_enabled = false

    [metrics]
    enabled = true
    bind = "0.0.0.0:9090"

    [plugins]
    enabled = true
    directory = "/app/plugins"
    auto_load = true
