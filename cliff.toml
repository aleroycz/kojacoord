# git-cliff configuration — generates changelogs from Conventional / semantic commits.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
# A Tera template rendered for the whole changelog / release notes body.
header = """
# Changelog\n
All notable changes to this project are documented here.
This file is generated from [Conventional Commits](https://www.conventionalcommits.org).\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.remote.username %} (by @{{ commit.remote.username }}){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
# Parse commits according to the Conventional Commits spec.
conventional_commits = true
filter_unconventional = false
split_commits = false
# Map commit messages to changelog sections.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 3 -->🚜 Refactor" },
  { message = "^doc", group = "<!-- 4 -->📚 Documentation" },
  { message = "^test", group = "<!-- 5 -->🧪 Testing" },
  { message = "^ci", group = "<!-- 6 -->⚙️ CI/CD" },
  { message = "^build", group = "<!-- 6 -->⚙️ CI/CD" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore\\(deps\\)", group = "<!-- 7 -->📦 Dependencies" },
  { message = "^chore", group = "<!-- 8 -->🧹 Miscellaneous" },
  { message = "^style", group = "<!-- 8 -->🧹 Miscellaneous" },
  { message = "^revert", group = "<!-- 9 -->◀️ Revert" },
  { body = ".*security", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = ".*", group = "<!-- 8 -->🧹 Miscellaneous" },
]
# Drop merge commits from the notes.
filter_commits = false
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
skip_tags = "v0.0.0"
ignore_tags = ""
topo_order = false
sort_commits = "newest"
# Hide noisy merge-commit subjects.
commit_preprocessors = [
  { pattern = "^Merge .*", replace = "" },
]
